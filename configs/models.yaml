base_models:
  qwen35_27b:
    model_id: "Qwen/Qwen3.5-27B"
    architecture: "qwen3.5"
    path: "/models/brains/qwen3.5-27b"
    size_gb: 14.0
    quantization: "nvfp4"
    context_length: 262144
    recommended_max_context: 131072
    load_policy: "always_resident"
    roles: ["physics", "math", "code", "general"]

lora_adapters:
  hep_physics:
    base_model: "qwen35_27b"
    path: "/models/adapters/hep_physics"
    size_gb: 0.3

  hep_code:
    base_model: "qwen35_27b"
    path: "/models/adapters/hep_code"
    size_gb: 0.3

infrastructure:
  router:
    model_id: "bert-base-uncased"
    path: "/models/infrastructure/router"
    size_gb: 0.06
    load_policy: "always_resident"

  think_prm:
    model_id: "PRIME-RL/ThinkPRM-1.5B"
    path: "/models/infrastructure/think-prm"
    size_gb: 0.8
    load_policy: "always_resident"

  draft_model:
    model_id: "Qwen/Qwen3.5-0.8B"
    path: "/models/infrastructure/draft-model"
    size_gb: 0.4
    load_policy: "always_resident"
    note: "Must match Qwen3.5 architecture. Alternative: use native MTP (--speculative-config '{\"method\": \"mtp\", \"num_speculative_tokens\": 4}') which requires no draft model."

  rag_embedding:
    model_id: "sentence-transformers/all-MiniLM-L6-v2"
    path: "/models/infrastructure/rag-embedding"
    size_gb: 0.09
    load_policy: "always_resident"

deferred_backends:
  # Models archived to D:\jarvis-models\ (external SSD).
  # Not runnable on current DGX Spark target (128 GB unified RAM) — see archive_v4_to_ssd.ps1.
  # To activate: change load_policy to "on_demand" or "always_resident" and copy weights
  # to the production model directory.

  deepseek_v4_flash:
    model_id: "deepseek-ai/DeepSeek-V4-Flash"
    architecture: "deepseek-v4"
    path: "D:/jarvis-models/deepseek/v4-flash-fp4"
    size_gb: 150.0
    quantization: "fp4_fp8_native"
    context_length: 1048576
    activated_params_b: 13
    total_params_b: 292
    load_policy: "archived"
    hardware_requirement: "Apple M3 Ultra 256GB / 2x H100 80GB / DGX Station"
    note: "Realistic escalation target for difficulty=hard queries. Native FP4+FP8 — do not sub-Q4 quantize."

  deepseek_v4_pro:
    model_id: "deepseek-ai/DeepSeek-V4-Pro"
    architecture: "deepseek-v4"
    path: "D:/jarvis-models/deepseek/v4-pro-fp4"
    size_gb: 850.0
    quantization: "fp4_fp8_native"
    context_length: 1048576
    activated_params_b: 49
    total_params_b: 1600
    load_policy: "archived"
    hardware_requirement: "DGX Station GB300 / 8x H100 / 4x Mac Studio cluster"
    note: "Archival only. Kept locally because MIT-licensed mirrors not guaranteed to persist on HF."

  deepseek_v4_flash_mlx:
    model_id: "mlx-community/DeepSeek-V4-Flash-4bit"
    architecture: "deepseek-v4"
    path: "D:/jarvis-models/deepseek/v4-flash-mlx-4bit"
    size_gb: 145.0
    quantization: "mlx_4bit"
    context_length: 1048576
    load_policy: "archived"
    hardware_requirement: "Apple Silicon (M3/M4 Ultra)"
    note: "Optional Apple Silicon backup plan. Only download if Mac Studio path is committed to."

specialists:
  chemistry:
    model_id: "AI4Chem/ChemLLM-7B-Chat"
    path: "/models/specialists/chemllm-7b"
    size_gb: 3.5
    quantization: "nvfp4"
    type: "text_llm"
    router_domain: "chemistry"
    load_policy: "on_demand"

  biology:
    model_id: "BioMistral/BioMistral-7B"
    path: "/models/specialists/biomistral-7b"
    size_gb: 3.5
    quantization: "nvfp4"
    type: "text_llm"
    router_domain: "biology"
    load_policy: "on_demand"

  protein:
    model_id: "EvolutionaryScale/esm3-sm-open-v1"
    path: "/models/specialists/esm3-open"
    size_gb: 0.7
    quantization: "fp16"
    type: "protein_model"
    router_domain: "protein"
    load_policy: "on_demand"
    api_adapter: "esm3"

  genomics:
    model_id: "arcinstitute/evo2-7b"
    path: "/models/specialists/evo2-7b"
    size_gb: 3.5
    quantization: "nvfp4"
    type: "dna_model"
    router_domain: "genomics"
    load_policy: "on_demand"
    api_adapter: "evo2"
