domain_classifier:
  model: "bert-base-uncased"
  checkpoint_path: "/models/infrastructure/router/domain_classifier"
  domains:
    - math
    - physics
    - code
    - chemistry
    - biology
    - protein
    - genomics
    - general
  confidence_threshold: 0.6
  fallback_domain: "general"

difficulty_estimator:
  model: "bert-base-uncased"
  checkpoint_path: "/models/infrastructure/router/difficulty_estimator"
  levels:
    - easy
    - medium
    - hard
  default_level: "medium"

hep_subdomain:
  enabled: true
  method: "keyword_plus_classifier"
  keywords:
    - "higgs"
    - "quark"
    - "gluon"
    - "cross-section"
    - "luminosity"
    - "detector"
    - "calorimeter"
    - "monte carlo"
    - "parton"
    - "collider"
    - "LHC"
    - "ATLAS"
    - "CMS"
    - "geant4"
    - "pythia"
    - "delphes"

# All domains route to the single Qwen3.5-27B base model.
# Domain classification is still used for:
#   1. Specialist dispatch (chemistry, biology, protein, genomics)
#   2. RAG activation (physics queries)
#   3. HEP LoRA activation (physics/code + HEP keywords)
#   4. Code verification strategy (code queries)
domain_to_brain:
  math:
    base_model: "qwen35_27b"
    adapter: null
  physics:
    base_model: "qwen35_27b"
    adapter: null
    hep_adapter: "hep_physics"
  code:
    base_model: "qwen35_27b"
    adapter: null
    hep_adapter: "hep_code"
  chemistry:
    specialist: "chemistry"
  biology:
    specialist: "biology"
  protein:
    specialist: "protein"
  genomics:
    specialist: "genomics"
  general:
    base_model: "qwen35_27b"
    adapter: null
